<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — 홈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="homepage.css" />
</head>
<body>

  <!-- GNB -->
  <nav class="gnb" id="gnb">
    <div class="gnb-inner">
      <a href="index.html" class="gnb-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">StudyHub</span>
      </a>
      <button class="gnb-hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
      <ul class="gnb-menu" id="gnbMenu">
        <li><a href="index.html" class="gnb-link active" data-label="HOME">홈</a></li>
        <li><a href="schedual.html" class="gnb-link" data-label="PLAN">일정관리</a></li>
        <li><a href="timeschedual.html" class="gnb-link" data-label="TIME">시간표</a></li>
        <li><a href="exam.html" class="gnb-link" data-label="EXAM">시험</a></li>
        <li><a href="data.html" class="gnb-link" data-label="DATA">자료</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-bg">
      <div class="hero-grid"></div>
      <div class="hero-blob blob1"></div>
      <div class="hero-blob blob2"></div>
    </div>
    <div class="hero-content">
      <p class="hero-eyebrow">오늘도 한 걸음씩</p>
      <h1 class="hero-title">나의 학습<br /><em>허브</em></h1>
      <p class="hero-subtitle" id="heroDate"></p>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="stat-card" data-href="schedual.html">
        <span class="stat-label">오늘 일정</span>
        <span class="stat-num" id="statToday">—</span>
        <span class="stat-sub">개 항목</span>
      </div>
      <div class="stat-card" data-href="schedual.html">
        <span class="stat-label">완료된 일정</span>
        <span class="stat-num" id="statDone">—</span>
        <span class="stat-sub">개</span>
      </div>
      <div class="stat-card" data-href="timeschedual.html">
        <span class="stat-label">이번 주 수업</span>
        <span class="stat-num" id="statClass">—</span>
        <span class="stat-sub">시간</span>
      </div>
      <div class="stat-card" data-href="exam.html">
        <span class="stat-label">다가오는 시험</span>
        <span class="stat-num" id="statExam">—</span>
        <span class="stat-sub">일 후</span>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-grid">

    <!-- 오늘의 일정 -->
    <section class="card card-schedule">
      <div class="card-header">
        <h2 class="card-title"><span class="card-icon">📋</span> 오늘의 일정</h2>
        <a href="schedual.html" class="card-more">전체보기 →</a>
      </div>
      <ul class="schedule-list" id="todayList">
        <li class="skeleton-item"></li>
        <li class="skeleton-item"></li>
        <li class="skeleton-item"></li>
      </ul>
    </section>

    <!-- 다가오는 시험 -->
    <section class="card card-exam">
      <div class="card-header">
        <h2 class="card-title"><span class="card-icon">📝</span> 다가오는 시험</h2>
        <a href="exam.html" class="card-more">전체보기 →</a>
      </div>
      <div class="exam-list" id="examList">
        <p class="empty-msg">시험 데이터를 불러오는 중...</p>
      </div>
    </section>

    <!-- 이번 주 일정 캘린더 (full width) -->
    <section class="card card-calendar">
      <div class="card-header">
        <h2 class="card-title"><span class="card-icon">📆</span> 일정 캘린더</h2>
        <div class="calendar-controls">
          <button class="ctrl-btn" id="btnCompact">
            <span class="ctrl-ico">⊟</span>
            <span class="ctrl-label">간단 보기</span>
          </button>
          <button class="ctrl-btn" id="btnDday">
            <span class="ctrl-ico">🎯</span>
            <span class="ctrl-label">D-day</span>
          </button>
          <button class="ctrl-btn" id="btnUpcoming">
            <span class="ctrl-ico">📌</span>
            <span class="ctrl-label">예정 일정</span>
          </button>
        </div>
        <div class="cal-nav">
          <button class="cal-nav-btn" id="calPrev">‹</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-nav-btn" id="calNext">›</button>
        </div>
      </div>

      <!-- 다가오는 일정 패널 -->
      <div class="upcoming-panel" id="upcomingPanel">
        <div class="upcoming-title">📌 7일 이내 미완료 일정</div>
        <div class="upcoming-list" id="upcomingList"><div class="skeleton-item"></div></div>
      </div>

      <!-- 달력 -->
      <div class="calendar-wrap">
        <div class="cal-day-headers">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div class="cal-grid" id="calGrid">
          <!-- JS로 렌더링 -->
        </div>
      </div>

      <!-- 범례 -->
      <div class="cal-legend">
        <span class="legend-item"><span class="legend-dot cat-과제"></span>과제/수행</span>
        <span class="legend-item"><span class="legend-dot cat-시험"></span>시험</span>
        <span class="legend-item"><span class="legend-dot cat-약속"></span>약속</span>
        <span class="legend-item"><span class="legend-dot cat-기타"></span>기타</span>
      </div>
    </section>

    <!-- 퀵 메뉴 -->
    <section class="card card-quick">
      <div class="card-header">
        <h2 class="card-title"><span class="card-icon">⚡</span> 빠른 이동</h2>
      </div>
      <div class="quick-grid">
        <a href="schedual.html" class="quick-btn">
          <span class="quick-ico">📅</span>
          <span>일정관리</span>
        </a>
        <a href="timeschedual.html" class="quick-btn">
          <span class="quick-ico">🗓️</span>
          <span>시간표</span>
        </a>
        <a href="exam.html" class="quick-btn">
          <span class="quick-ico">✏️</span>
          <span>시험</span>
        </a>
        <a href="data.html" class="quick-btn">
          <span class="quick-ico">📚</span>
          <span>자료</span>
        </a>
      </div>
    </section>

  </main>

  <!-- 날짜 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-header-info">
          <div class="modal-date-label" id="modalDateLabel"></div>
          <div class="modal-dday" id="modalDday"></div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-items" id="modalItems"></div>
        <button class="modal-add-btn" id="modalAddBtn">+ 일정 추가</button>
        <div class="modal-form" id="modalForm">
          <input type="hidden" id="formId" />
          <div class="form-row">
            <label>제목</label>
            <input type="text" id="formName" placeholder="일정 제목" />
          </div>
          <div class="form-row">
            <label>날짜/시간</label>
            <input type="datetime-local" id="formDate" />
          </div>
          <div class="form-row">
            <label>카테고리</label>
            <select id="formCategory">
              <option value="">선택 없음</option>
              <option value="과제">과제</option>
              <option value="수행">수행평가</option>
              <option value="시험">시험</option>
              <option value="약속">약속</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="form-row">
            <label>키워드</label>
            <input type="text" id="formKeywords" placeholder="쉼표로 구분 (예: 수학, 중간고사)" />
          </div>
          <div class="form-row">
            <label>내용</label>
            <textarea id="formContent" rows="2" placeholder="상세 내용"></textarea>
          </div>
          <div class="form-row">
            <label>추가 정보</label>
            <input type="text" id="formAdd" placeholder="추가 정보" />
          </div>
          <div class="form-actions">
            <button class="form-cancel" id="formCancel">취소</button>
            <button class="form-save" id="formSave">저장</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 StudyHub · 나만의 학습 관리 시스템</p>
  </footer>

  <script src="homepage.js"></script>
</body>
</html>
