<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데스크탑 펫 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Nanum+Gothic+Coding&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0f2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Gaegu', cursive;
    overflow: hidden;
  }

  .app-title {
    color: #f9d9a8;
    font-size: 1.4rem;
    margin-bottom: 10px;
    letter-spacing: 4px;
    opacity: 0.8;
  }

  /* ── SCENE CONTAINER ── */
  #scene {
    position: relative;
    width: 800px;
    height: 520px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,200,120,0.15), 0 0 120px rgba(100,60,200,0.1);
    border: 2px solid rgba(255,220,150,0.2);
  }

  /* ── BACKGROUND: ROOM ── */
  .room-bg {
    position: absolute;
    inset: 0;
    /* warm evening room */
    background: linear-gradient(180deg,
      #2d1b4e 0%,
      #3d2260 20%,
      #c8855a 20%,  /* wall top */
      #d4906a 55%,  /* wall */
      #8b5e3c 55%,  /* floor start */
      #6b4429 100%
    );
  }

  /* wallpaper pattern */
  .room-bg::before {
    content:'';
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px);
  }

  /* floor shine */
  .room-bg::after {
    content:'';
    position:absolute;
    bottom:0; left:0; right:0;
    height:46%;
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 60px,
      rgba(0,0,0,0.05) 60px, rgba(0,0,0,0.05) 120px
    );
  }

  /* baseboard */
  .baseboard {
    position:absolute;
    bottom: 43%;
    left:0; right:0;
    height: 12px;
    background: #5a3720;
    border-top: 2px solid #7a5030;
  }

  /* ── WINDOW ── */
  .window {
    position:absolute;
    top:30px; right:80px;
    width:120px; height:140px;
    background: linear-gradient(135deg, #a8d8ea 0%, #ffecd2 50%, #f7c59f 100%);
    border: 6px solid #7a5030;
    border-radius: 4px;
    overflow:hidden;
  }
  .window::before {
    content:'';
    position:absolute;
    top:50%; left:0; right:0;
    height:6px;
    background:#7a5030;
  }
  .window::after {
    content:'';
    position:absolute;
    top:0; bottom:0;
    left:50%;
    width:6px;
    background:#7a5030;
  }
  .window-glow {
    position:absolute;
    top:30px; right:80px;
    width:120px; height:140px;
    background: rgba(255,220,150,0.2);
    filter: blur(20px);
    pointer-events:none;
  }

  /* ── TV ── */
  .tv {
    position:absolute;
    bottom: 44%;
    left: 60px;
    width: 160px;
  }
  .tv-stand {
    position:absolute;
    bottom:-20px; left:50%;
    transform:translateX(-50%);
    width:50px; height:20px;
    background:#3a2510;
    border-radius:0 0 6px 6px;
  }
  .tv-body {
    background: #1a1a2e;
    border: 5px solid #2d2d3e;
    border-radius: 8px;
    padding: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .tv-screen {
    width:100%; height:75px;
    background: #0f0f1a;
    border-radius:4px;
    overflow:hidden;
    position:relative;
    transition: all 0.3s;
  }
  .tv-screen.on {
    background: #001a33;
    box-shadow: 0 0 20px rgba(100,180,255,0.6), inset 0 0 10px rgba(100,180,255,0.2);
  }
  .tv-scanlines {
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px
    );
    pointer-events:none;
    opacity:0;
  }
  .tv-screen.on .tv-scanlines { opacity:1; }
  .tv-content {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#6af;
    font-size:0.55rem;
    text-align:center;
    opacity:0;
    transition:opacity 0.5s;
    flex-direction:column;
    gap:3px;
  }
  .tv-screen.on .tv-content { opacity:1; }
  .tv-static {
    position:absolute; inset:0;
    background: 
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity:0;
    animation: staticAnim 0.1s steps(1) infinite;
  }
  .tv-screen.on .tv-static { opacity:0.08; }
  @keyframes staticAnim { 0%{background-position:0 0} 100%{background-position:100px 100px} }
  .tv-label { font-size:0.45rem; color:#888; text-align:center; margin-top:3px; }

  /* ── SOFA ── */
  .sofa {
    position:absolute;
    bottom: 43.5%;
    right: 60px;
    width: 190px;
  }
  .sofa-back {
    background: #8b4513;
    height:55px;
    border-radius: 10px 10px 0 0;
    position:relative;
    box-shadow: inset 0 3px 8px rgba(255,255,255,0.15);
  }
  .sofa-back::before, .sofa-back::after {
    content:'';
    position:absolute;
    bottom:-5px;
    width:35px; height:45px;
    background:#7a3d10;
    border-radius:6px;
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
  }
  .sofa-back::before { left:5px; }
  .sofa-back::after { right:5px; }
  .sofa-seat {
    background: #a0521d;
    height:32px;
    margin:0 5px;
    border-radius:0 0 8px 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,255,0.1);
    position:relative;
  }
  .sofa-seat::after {
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:60%;
    height:2px;
    background: rgba(0,0,0,0.2);
    border-radius:2px;
  }
  .sofa-legs {
    display:flex;
    justify-content: space-between;
    padding: 0 15px;
    margin-top:2px;
  }
  .sofa-leg {
    width:10px; height:14px;
    background:#5a2d0c;
    border-radius:0 0 3px 3px;
  }

  /* cushion on sofa */
  .cushion {
    position:absolute;
    top:5px;
    width:42px; height:36px;
    background: #c0392b;
    border-radius:8px;
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .cushion:nth-child(1) { left:15px; }
  .cushion:nth-child(2) { right:15px; }
  .cushion::after {
    content:'';
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:6px; height:6px;
    background:rgba(0,0,0,0.2);
    border-radius:50%;
  }

  /* ── PLANT ── */
  .plant {
    position:absolute;
    bottom: 43.5%;
    left: 50%;
    transform: translateX(-50%);
  }
  .pot {
    width:44px; height:36px;
    background: linear-gradient(135deg, #c1440e, #e85d04);
    border-radius: 4px 4px 8px 8px;
    position:relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .pot::before {
    content:'';
    position:absolute;
    top:-6px; left:-4px; right:-4px;
    height:10px;
    background: #d4570f;
    border-radius:4px;
  }
  .pot-soil {
    position:absolute;
    top:2px; left:4px; right:4px;
    height:10px;
    background:#3d1c02;
    border-radius:2px;
  }
  .stem {
    position:absolute;
    bottom:30px; left:50%;
    transform:translateX(-50%);
    width:4px;
    height:60px;
    background: linear-gradient(0deg, #2d5a1b, #3d7a23);
    border-radius:2px;
  }
  .leaf {
    position:absolute;
    width:30px; height:20px;
    background: linear-gradient(135deg, #2d8a1b, #4caf50);
    border-radius: 50% 0 50% 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .leaf:nth-child(1) { top:-50px; left:-25px; transform:rotate(-30deg); }
  .leaf:nth-child(2) { top:-40px; left:4px; transform:rotate(20deg) scaleX(-1); }
  .leaf:nth-child(3) { top:-70px; left:-18px; transform:rotate(-50deg); }
  .leaf:nth-child(4) { top:-60px; left:2px; transform:rotate(40deg) scaleX(-1); }

  /* water droplets */
  .water-drop {
    position:absolute;
    width:6px; height:8px;
    background: rgba(100,180,255,0.8);
    border-radius: 50% 50% 80% 80%;
    opacity:0;
    pointer-events:none;
  }

  /* ── RUG ── */
  .rug {
    position:absolute;
    bottom: 43.5%;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 18px;
    background: linear-gradient(90deg, #8b1a1a, #c0392b, #8b1a1a);
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    overflow:hidden;
  }
  .rug::before {
    content:'';
    position:absolute;
    inset:3px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius:2px;
  }

  /* ── WARDROBE ── */
  .wardrobe {
    position:absolute;
    bottom: 44%;
    right: 270px;
    width:80px;
  }
  .wardrobe-body {
    background: linear-gradient(135deg, #5c3317, #7a4420);
    height:120px;
    border-radius:6px 6px 2px 2px;
    border: 3px solid #3d2210;
    position:relative;
    box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
  }
  .wardrobe-body::before {
    content:'';
    position:absolute;
    top:6px; left:50%;
    transform:translateX(-50%);
    width:1px; height:calc(100% - 12px);
    background: rgba(0,0,0,0.3);
  }
  .wardrobe-handle {
    position:absolute;
    top:50%; 
    width:6px; height:12px;
    background: #c9a84c;
    border-radius:3px;
    transform:translateY(-50%);
  }
  .wardrobe-handle:first-of-type { left:15px; }
  .wardrobe-handle:last-of-type { right:15px; }
  .wardrobe-top {
    height:12px;
    background: #3d2210;
    border-radius:6px 6px 0 0;
    margin-bottom: -3px;
  }
  .wardrobe-feet {
    display:flex;
    justify-content:space-between;
    padding: 0 8px;
  }
  .wardrobe-foot {
    width:8px; height:8px;
    background:#2d1a0a;
    border-radius:0 0 3px 3px;
  }

  /* ── CEILING LAMP ── */
  .lamp {
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
  }
  .lamp-wire {
    width:2px; height:40px;
    background:#333;
    margin:0 auto;
  }
  .lamp-shade {
    width:60px; height:30px;
    background: linear-gradient(180deg, #c9a84c, #f0c850);
    border-radius:4px 4px 30px 30px;
    box-shadow: 0 0 30px rgba(255,200,100,0.5), 0 0 60px rgba(255,200,100,0.2);
  }
  .lamp-glow {
    position:absolute;
    top:60px; left:50%;
    transform:translateX(-50%);
    width:200px; height:100px;
    background: radial-gradient(ellipse, rgba(255,200,100,0.15) 0%, transparent 70%);
    pointer-events:none;
  }

  /* ── STATUS BAR ── */
  #status-bar {
    position:absolute;
    bottom:10px; left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding: 6px 20px;
    color:#f9d9a8;
    font-size:0.85rem;
    white-space:nowrap;
    transition: all 0.5s;
    letter-spacing:1px;
  }

  /* ── PET CHARACTER ── */
  #pet {
    position:absolute;
    width:52px;
    height:64px;
    cursor:pointer;
    z-index:100;
    transition: transform 0.1s;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  }
  #pet:hover { filter: drop-shadow(0 4px 12px rgba(255,200,100,0.6)); }
  #pet svg { width:100%; height:100%; }

  /* idle bob */
  @keyframes petBob {
    0%,100%{ transform: translateY(0) scaleX(var(--flip,1)); }
    50%{ transform: translateY(-3px) scaleX(var(--flip,1)); }
  }
  @keyframes petWalk {
    0%,100%{ transform: translateY(0) scaleX(var(--flip,1)); }
    25%{ transform: translateY(-4px) scaleX(var(--flip,1)); }
    75%{ transform: translateY(-2px) scaleX(var(--flip,1)); }
  }
  @keyframes petSit {
    0%,100%{ transform: translateY(2px) scaleX(var(--flip,1)); }
    50%{ transform: translateY(0px) scaleX(var(--flip,1)); }
  }
  @keyframes petTv {
    0%,100%{ transform: translateY(0) scaleX(var(--flip,1)) rotate(-2deg); }
    50%{ transform: translateY(-1px) scaleX(var(--flip,1)) rotate(2deg); }
  }

  /* speech bubble */
  #bubble {
    position:absolute;
    background: rgba(255,255,255,0.95);
    border-radius:14px;
    padding: 6px 12px;
    font-size:0.8rem;
    color:#333;
    pointer-events:none;
    z-index:200;
    white-space:nowrap;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    opacity:0;
    transform:translateY(5px);
    transition: opacity 0.3s, transform 0.3s;
  }
  #bubble.visible {
    opacity:1;
    transform:translateY(0);
  }
  #bubble::after {
    content:'';
    position:absolute;
    bottom:-8px; left:20px;
    border:8px solid transparent;
    border-top-color:rgba(255,255,255,0.95);
    border-bottom:none;
  }

  /* water animation */
  @keyframes dropFall {
    0%   { opacity:0.8; transform: translateY(0) rotate(0deg); }
    100% { opacity:0; transform: translateY(30px) rotate(15deg); }
  }
</style>
</head>
<body>

<div class="app-title">✨ 나의 데스크탑 펫 ✨</div>

<div id="scene">
  <!-- BACKGROUND -->
  <div class="room-bg"></div>
  <div class="baseboard"></div>

  <!-- WINDOW -->
  <div class="window-glow"></div>
  <div class="window"></div>

  <!-- CEILING LAMP -->
  <div class="lamp">
    <div class="lamp-wire"></div>
    <div class="lamp-shade"></div>
  </div>
  <div class="lamp-glow"></div>

  <!-- TV -->
  <div class="tv" id="tv">
    <div class="tv-body">
      <div class="tv-screen" id="tv-screen">
        <div class="tv-scanlines"></div>
        <div class="tv-static"></div>
        <div class="tv-content" id="tv-content">
          <div>📺</div>
          <div style="font-size:0.5rem;color:#8cf">지금 방송중</div>
        </div>
      </div>
      <div class="tv-label">ROBO-TV</div>
    </div>
    <div class="tv-stand"></div>
  </div>

  <!-- SOFA -->
  <div class="sofa" id="sofa">
    <div class="sofa-back">
      <div class="cushion"></div>
      <div class="cushion"></div>
    </div>
    <div class="sofa-seat"></div>
    <div class="sofa-legs">
      <div class="sofa-leg"></div>
      <div class="sofa-leg"></div>
    </div>
  </div>

  <!-- RUG -->
  <div class="rug"></div>

  <!-- PLANT -->
  <div class="plant" id="plant">
    <div class="stem">
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
      <div class="leaf"></div>
    </div>
    <div class="pot">
      <div class="pot-soil"></div>
    </div>
  </div>

  <!-- WARDROBE -->
  <div class="wardrobe" id="wardrobe">
    <div class="wardrobe-top"></div>
    <div class="wardrobe-body">
      <div class="wardrobe-handle"></div>
      <div class="wardrobe-handle"></div>
    </div>
    <div class="wardrobe-feet">
      <div class="wardrobe-foot"></div>
      <div class="wardrobe-foot"></div>
    </div>
  </div>

  <!-- PET -->
  <div id="pet">
    <svg viewBox="0 0 52 64" xmlns="http://www.w3.org/2000/svg">
      <!-- body -->
      <ellipse cx="26" cy="40" rx="17" ry="18" fill="#f0c8a0"/>
      <!-- head -->
      <circle cx="26" cy="20" r="16" fill="#f0c8a0"/>
      <!-- ears -->
      <ellipse cx="13" cy="9" rx="6" ry="8" fill="#f0c8a0"/>
      <ellipse cx="39" cy="9" rx="6" ry="8" fill="#f0c8a0"/>
      <ellipse cx="13" cy="9" rx="3.5" ry="5" fill="#f0a0a0" id="ear-l"/>
      <ellipse cx="39" cy="9" rx="3.5" ry="5" fill="#f0a0a0" id="ear-r"/>
      <!-- belly -->
      <ellipse cx="26" cy="42" rx="10" ry="12" fill="#fff5e8"/>
      <!-- face -->
      <!-- eyes -->
      <circle cx="20" cy="19" r="4" fill="#222" id="eye-l"/>
      <circle cx="32" cy="19" r="4" fill="#222" id="eye-r"/>
      <circle cx="21" cy="18" r="1.5" fill="white"/>
      <circle cx="33" cy="18" r="1.5" fill="white"/>
      <!-- nose -->
      <ellipse cx="26" cy="24" rx="3" ry="2" fill="#e8899a"/>
      <!-- mouth (happy) -->
      <path id="mouth" d="M22 27 Q26 31 30 27" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <ellipse cx="16" cy="25" rx="4" ry="2.5" fill="rgba(255,150,150,0.35)" id="blush-l"/>
      <ellipse cx="36" cy="25" rx="4" ry="2.5" fill="rgba(255,150,150,0.35)" id="blush-r"/>
      <!-- arms -->
      <ellipse cx="9" cy="40" rx="5" ry="8" fill="#f0c8a0" id="arm-l"/>
      <ellipse cx="43" cy="40" rx="5" ry="8" fill="#f0c8a0" id="arm-r"/>
      <!-- legs -->
      <ellipse cx="19" cy="57" rx="6" ry="7" fill="#f0c8a0" id="leg-l"/>
      <ellipse cx="33" cy="57" rx="6" ry="7" fill="#f0c8a0" id="leg-r"/>
      <!-- tail -->
      <path d="M42 48 Q55 45 52 38 Q49 31 44 36" stroke="#f0c8a0" stroke-width="5" fill="none" stroke-linecap="round" id="tail"/>
      <!-- shirt -->
      <path d="M10 38 Q26 44 42 38 L40 58 Q26 62 12 58 Z" fill="#6ab4f5" opacity="0.7"/>
      <path d="M18 38 L16 44 M34 38 L36 44" stroke="#5aa3e4" stroke-width="1" opacity="0.5"/>
    </svg>
  </div>

  <!-- SPEECH BUBBLE -->
  <div id="bubble"></div>

  <!-- STATUS -->
  <div id="status-bar">💤 자유롭게 돌아다니는 중...</div>
</div>

<script>
// ── FURNITURE ZONES (relative to scene) ──
const SCENE_W = 800, SCENE_H = 520;
const FLOOR_Y = 285; // pet's feet Y (top of floor)
const PET_W = 52, PET_H = 64;

// pet movement bounds
const BOUNDS = { left: 10, right: SCENE_W - PET_W - 10, top: FLOOR_Y - PET_H - 30, bottom: FLOOR_Y - PET_H + 10 };

// furniture interaction targets
const FURNITURE = {
  tv:    { x: 100,  y: FLOOR_Y - PET_H - 5, label: '티비' },
  sofa:  { x: 600,  y: FLOOR_Y - PET_H - 8, label: '소파' },
  plant: { x: 370,  y: FLOOR_Y - PET_H,     label: '화분' },
};

// ── STATE ──
let pet = { x: 300, y: FLOOR_Y - PET_H };
let target = null;
let state = 'idle'; // idle | walking | watching_tv | sitting | watering
let stateTimer = 0;
let idleTimer = 0;
let facing = 1; // 1=right, -1=left
let walkPhase = 0;
let tailPhase = 0;
let eyeBlinkTimer = 0;
let bubbleTimer = 0;

const petEl = document.getElementById('pet');
const bubbleEl = document.getElementById('bubble');
const statusEl = document.getElementById('status-bar');
const tvScreen = document.getElementById('tv-screen');
const tvContent = document.getElementById('tv-content');

// eye elements for blink
const eyeL = document.getElementById('eye-l');
const eyeR = document.getElementById('eye-r');

function setStatus(msg) {
  statusEl.textContent = msg;
}

function showBubble(text, duration = 2000) {
  bubbleEl.textContent = text;
  bubbleEl.classList.add('visible');
  clearTimeout(bubbleEl._timer);
  bubbleEl._timer = setTimeout(() => bubbleEl.classList.remove('visible'), duration);
}

function positionBubble() {
  const bx = pet.x - 10;
  const by = pet.y - 40;
  bubbleEl.style.left = Math.max(0, Math.min(SCENE_W - 150, bx)) + 'px';
  bubbleEl.style.top = Math.max(0, by) + 'px';
}

// ── PICK A RANDOM IDLE TARGET ──
function pickIdleTarget() {
  const x = BOUNDS.left + Math.random() * (BOUNDS.right - BOUNDS.left);
  const y = BOUNDS.top + Math.random() * (BOUNDS.bottom - BOUNDS.top);
  return { x, y };
}

// ── PICK A RANDOM ACTIVITY ──
const ACTIVITIES = ['watch_tv', 'sit_sofa', 'water_plant', 'idle_wander'];
const WEIGHTS    = [0.22,       0.22,       0.22,          0.34];

function pickActivity() {
  const r = Math.random();
  let acc = 0;
  for (let i = 0; i < ACTIVITIES.length; i++) {
    acc += WEIGHTS[i];
    if (r < acc) return ACTIVITIES[i];
  }
  return 'idle_wander';
}

function startActivity(act) {
  switch(act) {
    case 'watch_tv':
      target = { ...FURNITURE.tv };
      state = 'going_tv';
      setStatus('📺 티비 보러 가는 중...');
      break;
    case 'sit_sofa':
      target = { ...FURNITURE.sofa };
      state = 'going_sofa';
      setStatus('🛋️ 소파 가러 가는 중...');
      break;
    case 'water_plant':
      target = { ...FURNITURE.plant };
      state = 'going_plant';
      setStatus('🌱 화분에 물 주러 가는 중...');
      break;
    default:
      target = pickIdleTarget();
      state = 'walking';
      setStatus('💤 자유롭게 돌아다니는 중...');
  }
}

// ── TV ──
function turnOnTv() {
  tvScreen.classList.add('on');
  const shows = ['🌟 별빛 뉴스', '🎵 음악 프로그램', '🎬 영화 상영', '🐱 고양이 TV'];
  tvContent.innerHTML = `<div>📺</div><div style="font-size:0.45rem;color:#adf">${shows[Math.floor(Math.random()*shows.length)]}</div>`;
}
function turnOffTv() {
  tvScreen.classList.remove('on');
}

// ── WATER DROPS ──
function spawnDrop() {
  const drop = document.createElement('div');
  drop.className = 'water-drop';
  drop.style.left = (380 + (Math.random()-0.5)*20) + 'px';
  drop.style.top = (FLOOR_Y - PET_H - 60 + Math.random()*20) + 'px';
  document.getElementById('scene').appendChild(drop);
  drop.style.animation = 'dropFall 0.6s ease-in forwards';
  drop.style.opacity = '0.8';
  setTimeout(() => drop.remove(), 700);
}

// ── BLINK ──
function doBlink() {
  [eyeL, eyeR].forEach(e => {
    e.setAttribute('ry','0.3');
    setTimeout(() => e.setAttribute('ry','4'), 150);
  });
}

// ── MOVE TOWARDS TARGET ──
function moveTowards(tx, ty, speed) {
  const dx = tx - pet.x, dy = ty - pet.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < speed) {
    pet.x = tx; pet.y = ty;
    return true; // arrived
  }
  pet.x += (dx/dist) * speed;
  pet.y += (dy/dist) * speed;
  facing = dx > 0 ? 1 : -1;
  return false;
}

// ── ANIMATION LOOP ──
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  walkPhase += dt * 6;
  tailPhase += dt * 2;
  eyeBlinkTimer += dt;
  stateTimer += dt;
  idleTimer += dt;

  // blink every 3-5s
  if (eyeBlinkTimer > 3 + Math.random()*2) {
    doBlink();
    eyeBlinkTimer = 0;
  }

  // ── STATE MACHINE ──
  switch(state) {
    case 'idle': {
      // gentle bob in place
      if (idleTimer > 5 + Math.random() * 5) {
        idleTimer = 0;
        const act = pickActivity();
        startActivity(act);
      }
      break;
    }
    case 'walking': {
      if (!target) { state='idle'; break; }
      const arrived = moveTowards(target.x, target.y, 60*dt);
      if (arrived) {
        target = null;
        state = 'idle';
        stateTimer = 0;
      }
      break;
    }
    case 'going_tv': {
      const arrived = moveTowards(FURNITURE.tv.x, FURNITURE.tv.y, 70*dt);
      if (arrived) {
        state = 'watching_tv';
        stateTimer = 0;
        facing = -1;
        turnOnTv();
        showBubble('오~ 재밌다! 😄', 2500);
        setStatus('📺 티비 시청 중...');
      }
      break;
    }
    case 'watching_tv': {
      if (stateTimer > 5 + Math.random()*4) {
        turnOffTv();
        showBubble('다 봤다! 🎉');
        state = 'idle';
        stateTimer = 0;
        setStatus('💤 자유롭게 돌아다니는 중...');
      }
      break;
    }
    case 'going_sofa': {
      const arrived = moveTowards(FURNITURE.sofa.x, FURNITURE.sofa.y, 70*dt);
      if (arrived) {
        state = 'sitting';
        stateTimer = 0;
        showBubble('아~ 편하다~ 😌', 2500);
        setStatus('🛋️ 소파에 앉아있는 중...');
      }
      break;
    }
    case 'sitting': {
      if (stateTimer > 5 + Math.random()*5) {
        showBubble('일어나야겠다! 🙆');
        state = 'idle';
        stateTimer = 0;
        setStatus('💤 자유롭게 돌아다니는 중...');
      }
      break;
    }
    case 'going_plant': {
      const arrived = moveTowards(FURNITURE.plant.x, FURNITURE.plant.y, 70*dt);
      if (arrived) {
        state = 'watering';
        stateTimer = 0;
        showBubble('화분아, 물 줄게! 💧', 2000);
        setStatus('🌱 물 주는 중...');
      }
      break;
    }
    case 'watering': {
      // spawn drops
      if (stateTimer > 0.3 && Math.random() < 0.15) {
        spawnDrop();
      }
      if (stateTimer > 3 + Math.random()*2) {
        showBubble('쑥쑥 자라렴! 🌿');
        state = 'idle';
        stateTimer = 0;
        setStatus('💤 자유롭게 돌아다니는 중...');
      }
      break;
    }
  }

  // ── RENDER PET ──
  petEl.style.left = pet.x + 'px';
  petEl.style.top = pet.y + 'px';
  petEl.style.setProperty('--flip', facing);

  // flip horizontally
  const svg = petEl.querySelector('svg');
  svg.style.transform = facing === -1 ? 'scaleX(-1)' : 'scaleX(1)';

  // leg animation
  const legL = document.getElementById('leg-l');
  const legR = document.getElementById('leg-r');
  const armL = document.getElementById('arm-l');
  const armR = document.getElementById('arm-r');
  const tail = document.getElementById('tail');

  const isWalking = (state === 'walking' || state === 'going_tv' || state === 'going_sofa' || state === 'going_plant');
  const isSitting = (state === 'sitting');
  const isWatching = (state === 'watching_tv');
  const isWatering = (state === 'watering');

  if (isWalking) {
    const s = Math.sin(walkPhase);
    legL.setAttribute('cy', 57 + s*3);
    legR.setAttribute('cy', 57 - s*3);
    armL.setAttribute('cy', 40 + s*2);
    armR.setAttribute('cy', 40 - s*2);
  } else if (isSitting) {
    // squish down
    legL.setAttribute('cy', 60);
    legR.setAttribute('cy', 60);
    legL.setAttribute('rx', '8');
    legR.setAttribute('rx', '8');
    legL.setAttribute('ry', '5');
    legR.setAttribute('ry', '5');
    armL.setAttribute('cy', 42);
    armR.setAttribute('cy', 42);
  } else if (isWatering) {
    // raise arm
    armL.setAttribute('cy', 34);
    armL.setAttribute('cx', '7');
    legL.setAttribute('cy', 57);
    legR.setAttribute('cy', 57);
    legL.setAttribute('rx', '6'); legL.setAttribute('ry', '7');
    legR.setAttribute('rx', '6'); legR.setAttribute('ry', '7');
  } else {
    // reset
    legL.setAttribute('cy', 57); legR.setAttribute('cy', 57);
    legL.setAttribute('rx', '6'); legL.setAttribute('ry', '7');
    legR.setAttribute('rx', '6'); legR.setAttribute('ry', '7');
    armL.setAttribute('cy', 40); armR.setAttribute('cy', 40);
    armL.setAttribute('cx', '9'); armR.setAttribute('cx', '43');
  }

  // tail wag
  const tw = Math.sin(tailPhase * 2) * 4;
  tail.setAttribute('d', `M42 48 Q${55+tw} ${45+tw*0.3} ${52+tw*0.5} 38 Q49 31 44 36`);

  // bubble position
  positionBubble();

  requestAnimationFrame(loop);
}

// ── CLICK PET ──
petEl.addEventListener('click', () => {
  const msgs = ['안녕! 👋', '나 여기 있어! 😊', '놀아줘~! 🎮', '배고파요... 🍎', '같이 놀자! 🌟', '방가방가! ✨'];
  showBubble(msgs[Math.floor(Math.random()*msgs.length)], 2000);
});

// ── START ──
// initial random position
pet.x = 250 + Math.random() * 300;
pet.y = FLOOR_Y - PET_H;
state = 'idle';

requestAnimationFrame((ts) => {
  lastTime = ts;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
