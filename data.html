<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — 자료</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="homepage.css" />
  <link rel="stylesheet" href="data.css" />
</head>
<body>

  <!-- GNB -->
  <nav class="gnb" id="gnb">
    <div class="gnb-inner">
      <a href="index.html" class="gnb-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">StudyHub</span>
      </a>
      <button class="gnb-hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
      <ul class="gnb-menu" id="gnbMenu">
        <li><a href="index.html"        class="gnb-link"        data-label="HOME">홈</a></li>
        <li><a href="timeschedual.html" class="gnb-link"        data-label="TIME">시간표</a></li>
        <li><a href="exam.html"         class="gnb-link"        data-label="EXAM">시험</a></li>
        <li><a href="data.html"         class="gnb-link active" data-label="DATA">자료</a></li>
        <li class="gnb-divider"></li>
        <li><a href="tool.html"         class="gnb-link"        data-label="TOOL">도구</a></li>
        <li><a href="memo.html"         class="gnb-link"        data-label="MEMO">생기부</a></li>
        <li><a href="ai.html"           class="gnb-link gnb-link-ai" data-label="AI">AI</a></li>
      </ul>
    </div>
  </nav>

  <!-- ══ 페이지 헤더 ══════════════════════════ -->
  <div class="dh-header">
    <div class="dh-header-inner">
      <div>
        <p class="dh-eyebrow">STUDY LIBRARY</p>
        <h1 class="dh-title">자료 보관함</h1>
        <p class="dh-sub" id="dhDate"></p>
      </div>
      <div class="dh-header-btns">
        <button class="dh-btn-ghost" id="btnManageCat">🏷 카테고리</button>
        <button class="dh-btn-accent" id="btnNewList">+ 새 묶음</button>
      </div>
    </div>

    <!-- 필터 / 검색 바 -->
    <div class="dh-filter-bar">
      <div class="dh-search-wrap">
        <span class="dh-si">🔍</span>
        <input type="text" class="dh-search" id="searchInput" placeholder="묶음 검색..." />
      </div>
      <div class="dh-chips-row" id="catChips">
        <button class="dh-chip active" data-id="all">전체</button>
      </div>
      <select class="dh-select" id="sortSelect">
        <option value="updated">최근 수정순</option>
        <option value="created">생성순</option>
        <option value="name">이름순</option>
      </select>
    </div>
  </div>

  <!-- ══ 메인: 묶음 그리드 ════════════════════ -->
  <div class="dh-main" id="dhMain">
    <div class="dh-grid" id="listGrid">
      <div class="dh-skel"></div><div class="dh-skel"></div>
      <div class="dh-skel"></div><div class="dh-skel"></div>
      <div class="dh-skel"></div><div class="dh-skel"></div>
    </div>
    <div class="dh-empty" id="emptyMsg" style="display:none">
      <div class="dh-empty-ico">📂</div>
      <div class="dh-empty-t">자료 묶음이 없습니다</div>
      <div class="dh-empty-s">새 묶음을 만들어 자료를 정리해 보세요.</div>
      <button class="dh-btn-accent" id="btnNewListEmpty">+ 첫 묶음 만들기</button>
    </div>
  </div>

  <!-- ══ 확장 패널 (묶음 클릭 시 전체화면) ══ -->
  <div class="dh-expand" id="expandPanel" style="display:none">
    <!-- 배경 블러 클릭 닫기 -->
    <div class="dh-expand-bg" id="expandBg"></div>

    <div class="dh-expand-inner">
      <!-- 상단 헤더 -->
      <div class="dh-exp-hd">
        <div class="dh-exp-cover" id="expCover"></div>
        <div class="dh-exp-info">
          <div class="dh-exp-tags" id="expTags"></div>
          <h2 class="dh-exp-name" id="expName"></h2>
          <p  class="dh-exp-desc" id="expDesc"></p>
          <div class="dh-exp-meta" id="expMeta"></div>
        </div>
        <div class="dh-exp-top-actions">
          <button class="dh-exp-act" id="expBtnAdd">+ 자료 추가</button>
          <button class="dh-exp-act" id="expBtnEdit">✏️ 수정</button>
          <button class="dh-exp-act danger" id="expBtnDel">🗑️</button>
          <button class="dh-exp-close" id="expandClose">✕</button>
        </div>
      </div>

      <!-- 바디: 자료 목록 + 뷰어 -->
      <div class="dh-exp-body">

        <!-- 왼쪽: 자료 목록 -->
        <div class="dh-exp-list-col">
          <div class="dh-exp-list-hd">
            <div class="dh-chips-row" id="typeChips">
              <button class="dh-chip active" data-type="all">전체</button>
              <button class="dh-chip" data-type="link">🔗 링크</button>
              <button class="dh-chip" data-type="note">📝 노트</button>
              <button class="dh-chip" data-type="file">📎 파일</button>
              <button class="dh-chip" data-type="video">🎬 영상</button>
            </div>
            <span class="dh-items-cnt" id="itemsCnt"></span>
          </div>
          <div class="dh-exp-list" id="itemsList"></div>
        </div>

        <!-- 오른쪽: 뷰어 -->
        <div class="dh-exp-viewer" id="expViewer">
          <div class="dh-viewer-placeholder" id="viewerPlaceholder">
            <span>👆</span>
            <p>자료를 선택하면<br>내용이 표시됩니다</p>
          </div>
          <div class="dh-viewer-content" id="viewerContent" style="display:none">
            <div class="dh-viewer-hd" id="viewerHd"></div>
            <div class="dh-viewer-body" id="viewerBody"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ══ 묶음 추가/수정 모달 ════════════════ -->
  <div class="dh-overlay" id="listModal">
    <div class="dh-modal">
      <div class="dh-modal-hd">
        <span id="listModalTitle">새 자료 묶음</span>
        <button class="dh-modal-x" id="listModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <input type="hidden" id="listId" />
        <div class="dh-field">
          <label>제목 <span class="dh-req">*</span></label>
          <input type="text" id="listTitle" placeholder="묶음 이름" />
        </div>
        <div class="dh-field">
          <label>설명</label>
          <textarea id="listDesc" rows="2" placeholder="간단한 설명 (선택)"></textarea>
        </div>
        <div class="dh-field">
          <label>난이도</label>
          <div class="dh-btn-row">
            <button class="dh-tog active" data-v="">없음</button>
            <button class="dh-tog" data-v="초급">🟢 초급</button>
            <button class="dh-tog" data-v="중급">🟡 중급</button>
            <button class="dh-tog" data-v="고급">🔴 고급</button>
          </div>
          <input type="hidden" id="listDiff" value="" />
        </div>
        <div class="dh-field">
          <label>카테고리</label>
          <div class="dh-cat-sel" id="listCatSel">
            <span class="dh-hint">카테고리가 없습니다</span>
          </div>
        </div>
        <div class="dh-modal-ft">
          <button class="dh-btn-ghost" id="listModalCancel">취소</button>
          <button class="dh-btn-accent" id="listModalSave">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 자료 추가/수정 모달 ════════════════ -->
  <div class="dh-overlay" id="itemModal">
    <div class="dh-modal dh-modal-lg">
      <div class="dh-modal-hd">
        <span id="itemModalTitle">자료 추가</span>
        <button class="dh-modal-x" id="itemModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <input type="hidden" id="itemId" />

        <div class="dh-field">
          <label>유형</label>
          <div class="dh-btn-row" id="typeBtnRow">
            <button class="dh-tog active" data-v="link">🔗 링크</button>
            <button class="dh-tog" data-v="note">📝 노트</button>
            <button class="dh-tog" data-v="file">📎 파일</button>
            <button class="dh-tog" data-v="video">🎬 영상</button>
          </div>
          <input type="hidden" id="itemType" value="link" />
        </div>

        <div class="dh-field">
          <label>제목 <span class="dh-req">*</span></label>
          <input type="text" id="itemTitle" placeholder="자료 제목" />
        </div>

        <!-- URL 필드 (링크/영상) -->
        <div class="dh-field" id="fldUrl">
          <label>URL</label>
          <input type="url" id="itemUrl" placeholder="https://..." />
          <span class="dh-hint" id="urlHint"></span>
        </div>

        <!-- 파일 업로드 필드 -->
        <div class="dh-field" id="fldFile" style="display:none">
          <label>파일 업로드</label>
          <div class="dh-dropzone" id="dropzone">
            <input type="file" id="fileInput" class="dh-file-input" />
            <div class="dh-dropzone-inner" id="dropzoneInner">
              <span class="dh-dz-ico">📤</span>
              <p class="dh-dz-text">클릭하거나 파일을 드래그하세요</p>
              <p class="dh-dz-hint">최대 50MB · 모든 형식 지원</p>
            </div>
          </div>
          <!-- 업로드된 파일 표시 -->
          <div class="dh-file-preview" id="filePreview" style="display:none">
            <span class="dh-file-ico" id="filePreviewIco">📎</span>
            <span class="dh-file-name" id="filePreviewName"></span>
            <button class="dh-file-remove" id="fileRemove">✕</button>
          </div>
          <div class="dh-upload-bar" id="uploadBar" style="display:none">
            <div class="dh-upload-fill" id="uploadFill"></div>
          </div>
          <span class="dh-hint" id="uploadStatus"></span>
        </div>

        <div class="dh-field">
          <label>내용 / 메모</label>
          <textarea id="itemContent" rows="5" placeholder="내용을 입력하세요..."></textarea>
        </div>

        <div class="dh-modal-ft">
          <button class="dh-btn-ghost" id="itemModalCancel">취소</button>
          <button class="dh-btn-accent" id="itemModalSave">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 카테고리 관리 모달 ════════════════ -->
  <div class="dh-overlay" id="catModal">
    <div class="dh-modal dh-modal-wide">
      <div class="dh-modal-hd">
        <span>🏷 카테고리 관리</span>
        <button class="dh-modal-x" id="catModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <div class="dh-cat-mgr">
          <div class="dh-cat-col">
            <div class="dh-col-title">등록된 카테고리</div>
            <div id="catMgrList" class="dh-cat-mgr-list">
              <span class="dh-hint">없음</span>
            </div>
          </div>
          <div class="dh-cat-col">
            <div class="dh-col-title">새 카테고리</div>
            <div class="dh-field">
              <label>이름 <span class="dh-req">*</span></label>
              <input type="text" id="catName" placeholder="예: 수학, 영어 단어" />
            </div>
            <div class="dh-field">
              <label>상위 카테고리</label>
              <select id="catParent">
                <option value="">없음 (최상위)</option>
              </select>
            </div>
            <button class="dh-btn-accent" id="catAddBtn" style="width:100%">추가</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer"><p>© 2025 StudyHub · 나만의 학습 관리 시스템</p></footer>
  <script src="data.js"></script>
</body>
</html>
