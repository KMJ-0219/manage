<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — 자료</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="homepage.css" />
  <link rel="stylesheet" href="data.css" />
</head>
<body>

  <!-- GNB -->
  <nav class="gnb" id="gnb">
    <div class="gnb-inner">
      <a href="index.html" class="gnb-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">StudyHub</span>
      </a>
      <button class="gnb-hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
      <ul class="gnb-menu" id="gnbMenu">
        <li><a href="index.html"        class="gnb-link"        data-label="HOME">홈</a></li>
        <li><a href="timeschedual.html" class="gnb-link"        data-label="TIME">시간표</a></li>
        <li><a href="exam.html"         class="gnb-link"        data-label="EXAM">시험</a></li>
        <li><a href="data.html"         class="gnb-link active" data-label="DATA">자료</a></li>
        <li class="gnb-divider"></li>
        <li><a href="tool.html"         class="gnb-link"        data-label="TOOL">도구</a></li>
        <li><a href="memo.html"         class="gnb-link"        data-label="MEMO">생기부</a></li>
        <li><a href="ai.html"           class="gnb-link gnb-link-ai" data-label="AI">AI</a></li>
      </ul>
    </div>
  </nav>

  <!-- 페이지 헤더 -->
  <div class="dh-header">
    <div class="dh-header-inner">
      <div class="dh-header-text">
        <p class="dh-eyebrow">STUDY LIBRARY</p>
        <h1 class="dh-title">자료 보관함</h1>
        <p class="dh-sub" id="dhDate"></p>
      </div>
      <div class="dh-header-actions">
        <button class="dh-btn-secondary" id="btnManageCategories">🏷 카테고리</button>
        <button class="dh-btn-primary" id="btnNewPlaylist">+ 플레이리스트</button>
      </div>
    </div>

    <!-- 검색 + 카테고리 필터 바 -->
    <div class="dh-filter-bar">
      <div class="dh-search-wrap">
        <span class="dh-search-ico">🔍</span>
        <input type="text" class="dh-search" id="searchInput" placeholder="플레이리스트, 자료 검색..." />
      </div>
      <div class="dh-cat-filter" id="catFilterBar">
        <button class="dh-cat-chip active" data-cat-id="all">전체</button>
        <!-- 카테고리 칩들 JS로 렌더 -->
      </div>
      <div class="dh-sort-wrap">
        <select class="dh-select" id="sortSelect">
          <option value="updated">최근 수정순</option>
          <option value="created">생성순</option>
          <option value="name">이름순</option>
          <option value="items">자료 수</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 메인 레이아웃: 왼쪽 플레이리스트 그리드 / 오른쪽 상세 패널 -->
  <div class="dh-layout">

    <!-- 플레이리스트 그리드 -->
    <div class="dh-playlist-area" id="playlistArea">
      <div class="dh-playlist-grid" id="playlistGrid">
        <!-- 스켈레톤 -->
        <div class="dh-skeleton"></div>
        <div class="dh-skeleton"></div>
        <div class="dh-skeleton"></div>
        <div class="dh-skeleton"></div>
      </div>
      <!-- 빈 상태 -->
      <div class="dh-empty" id="emptyState" style="display:none">
        <div class="dh-empty-ico">📂</div>
        <div class="dh-empty-title">플레이리스트가 없습니다</div>
        <div class="dh-empty-sub">새 플레이리스트를 만들어 자료를 추가해 보세요.</div>
        <button class="dh-btn-primary" id="btnNewPlaylistEmpty">+ 첫 플레이리스트 만들기</button>
      </div>
    </div>

    <!-- 자료 상세 패널 (오른쪽 슬라이드) -->
    <div class="dh-detail-panel" id="detailPanel">
      <div class="dh-detail-empty" id="detailEmpty">
        <div class="dh-detail-empty-ico">👆</div>
        <p>플레이리스트를 선택하세요</p>
      </div>
      <div class="dh-detail-content" id="detailContent" style="display:none">

        <!-- 상세 헤더 -->
        <div class="dh-detail-hd">
          <div class="dh-detail-hd-top">
            <div class="dh-detail-cover" id="detailCover"></div>
            <div class="dh-detail-info">
              <div class="dh-detail-cats" id="detailCats"></div>
              <h2 class="dh-detail-title" id="detailTitle"></h2>
              <p class="dh-detail-desc" id="detailDesc"></p>
              <div class="dh-detail-meta" id="detailMeta"></div>
            </div>
          </div>
          <div class="dh-detail-actions">
            <button class="dh-detail-btn" id="btnAddItem">+ 자료 추가</button>
            <button class="dh-detail-btn" id="btnEditPlaylist">✏️ 수정</button>
            <button class="dh-detail-btn danger" id="btnDeletePlaylist">🗑️ 삭제</button>
            <button class="dh-detail-close" id="detailClose">✕</button>
          </div>
        </div>

        <!-- 자료 목록 -->
        <div class="dh-items-area">
          <div class="dh-items-header">
            <span class="dh-items-count" id="itemsCount"></span>
            <div class="dh-items-filter">
              <button class="dh-type-chip active" data-type="all">전체</button>
              <button class="dh-type-chip" data-type="link">🔗 링크</button>
              <button class="dh-type-chip" data-type="note">📝 노트</button>
              <button class="dh-type-chip" data-type="file">📎 파일</button>
              <button class="dh-type-chip" data-type="video">🎬 영상</button>
            </div>
          </div>
          <div class="dh-items-list" id="itemsList">
            <!-- 자료 아이템들 JS로 렌더 -->
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- ══ 플레이리스트 추가/수정 모달 ══ -->
  <div class="dh-modal-overlay" id="plModalOverlay">
    <div class="dh-modal">
      <div class="dh-modal-hd">
        <span class="dh-modal-title" id="plModalTitle">새 플레이리스트</span>
        <button class="dh-modal-close" id="plModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <input type="hidden" id="plId" />
        <div class="dh-form-row">
          <label class="dh-form-label">제목 <span class="dh-req">*</span></label>
          <input type="text" class="dh-form-input" id="plTitle" placeholder="플레이리스트 이름" />
        </div>
        <div class="dh-form-row">
          <label class="dh-form-label">설명</label>
          <textarea class="dh-form-input dh-form-textarea" id="plDesc" rows="3" placeholder="간단한 설명"></textarea>
        </div>
        <div class="dh-form-row">
          <label class="dh-form-label">난이도</label>
          <div class="dh-diff-btns">
            <button class="dh-diff-btn" data-diff="">없음</button>
            <button class="dh-diff-btn" data-diff="초급">🟢 초급</button>
            <button class="dh-diff-btn" data-diff="중급">🟡 중급</button>
            <button class="dh-diff-btn" data-diff="고급">🔴 고급</button>
          </div>
          <input type="hidden" id="plDiff" value="" />
        </div>
        <div class="dh-form-row">
          <label class="dh-form-label">카테고리</label>
          <div class="dh-cat-select-list" id="plCatList">
            <!-- JS로 렌더 -->
          </div>
        </div>
        <div class="dh-modal-actions">
          <button class="dh-btn-ghost" id="plModalCancel">취소</button>
          <button class="dh-btn-primary" id="plModalSave">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 자료 아이템 추가/수정 모달 ══ -->
  <div class="dh-modal-overlay" id="itemModalOverlay">
    <div class="dh-modal">
      <div class="dh-modal-hd">
        <span class="dh-modal-title" id="itemModalTitle">자료 추가</span>
        <button class="dh-modal-close" id="itemModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <input type="hidden" id="itemId" />
        <div class="dh-form-row">
          <label class="dh-form-label">자료 유형</label>
          <div class="dh-type-select" id="itemTypeSelect">
            <button class="dh-type-sel-btn active" data-type="link">🔗 링크</button>
            <button class="dh-type-sel-btn" data-type="note">📝 노트</button>
            <button class="dh-type-sel-btn" data-type="file">📎 파일</button>
            <button class="dh-type-sel-btn" data-type="video">🎬 영상</button>
          </div>
          <input type="hidden" id="itemType" value="link" />
        </div>
        <div class="dh-form-row">
          <label class="dh-form-label">제목 <span class="dh-req">*</span></label>
          <input type="text" class="dh-form-input" id="itemTitle" placeholder="자료 제목" />
        </div>
        <div class="dh-form-row" id="itemUrlRow">
          <label class="dh-form-label">URL</label>
          <input type="url" class="dh-form-input" id="itemUrl" placeholder="https://..." />
        </div>
        <div class="dh-form-row">
          <label class="dh-form-label">내용 / 메모</label>
          <textarea class="dh-form-input dh-form-textarea" id="itemContent" rows="4" placeholder="내용을 입력하세요..."></textarea>
        </div>
        <div class="dh-modal-actions">
          <button class="dh-btn-ghost" id="itemModalCancel">취소</button>
          <button class="dh-btn-primary" id="itemModalSave">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 카테고리 관리 모달 ══ -->
  <div class="dh-modal-overlay" id="catModalOverlay">
    <div class="dh-modal dh-modal-wide">
      <div class="dh-modal-hd">
        <span class="dh-modal-title">🏷 카테고리 관리</span>
        <button class="dh-modal-close" id="catModalClose">✕</button>
      </div>
      <div class="dh-modal-bd">
        <div class="dh-cat-mgr">
          <div class="dh-cat-mgr-list" id="catMgrList">
            <!-- JS로 렌더 -->
          </div>
          <div class="dh-cat-mgr-form">
            <input type="hidden" id="catEditId" />
            <div class="dh-form-row">
              <label class="dh-form-label">카테고리 이름 <span class="dh-req">*</span></label>
              <input type="text" class="dh-form-input" id="catName" placeholder="새 카테고리" />
            </div>
            <div class="dh-form-row">
              <label class="dh-form-label">상위 카테고리</label>
              <select class="dh-form-input" id="catParent">
                <option value="">없음 (최상위)</option>
              </select>
            </div>
            <div class="dh-modal-actions" style="padding-top:0">
              <button class="dh-btn-ghost" id="catFormReset">초기화</button>
              <button class="dh-btn-primary" id="catFormSave">추가</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 자료 뷰어 (노트/내용 전체 보기) ══ -->
  <div class="dh-viewer-overlay" id="viewerOverlay">
    <div class="dh-viewer">
      <div class="dh-viewer-hd">
        <div class="dh-viewer-title-wrap">
          <span class="dh-viewer-type-badge" id="viewerTypeBadge"></span>
          <span class="dh-viewer-title" id="viewerTitle"></span>
        </div>
        <div style="display:flex;gap:8px">
          <a class="dh-viewer-link-btn" id="viewerLinkBtn" href="#" target="_blank" rel="noopener" style="display:none">🔗 열기</a>
          <button class="dh-modal-close" id="viewerClose">✕</button>
        </div>
      </div>
      <div class="dh-viewer-body" id="viewerBody"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 StudyHub · 나만의 학습 관리 시스템</p>
  </footer>

  <script src="data.js"></script>
</body>
</html>
