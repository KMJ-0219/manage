<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub — 일정관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="schedual.css" />
</head>
<body>

  <!-- GNB -->
  <nav class="gnb" id="gnb">
    <div class="gnb-inner">
      <a href="index.html" class="gnb-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">StudyHub</span>
      </a>
      <button class="gnb-hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
      <ul class="gnb-menu" id="gnbMenu">
        <li><a href="index.html"        class="gnb-link"        data-label="HOME">홈</a></li>
        <li><a href="schedual.html"     class="gnb-link active" data-label="PLAN">일정관리</a></li>
        <li><a href="timeschedual.html" class="gnb-link"        data-label="TIME">시간표</a></li>
        <li><a href="exam.html"         class="gnb-link"        data-label="EXAM">시험</a></li>
        <li><a href="data.html"         class="gnb-link"        data-label="DATA">자료</a></li>
        <li class="gnb-divider"></li>
        <li><a href="tool.html"         class="gnb-link"        data-label="TOOL">도구</a></li>
        <li><a href="memo.html"         class="gnb-link"        data-label="MEMO">생기부</a></li>
        <li><a href="ai.html"           class="gnb-link gnb-link-ai" data-label="AI">AI</a></li>
      </ul>
    </div>
  </nav>

  <!-- 페이지 헤더 -->
  <div class="page-hero">
    <p class="page-eyebrow">PLAN · MANAGE · TRACK</p>
    <h1 class="page-title">일정 <em>관리</em></h1>
    <p class="page-subtitle">모든 일정을 한 곳에서 관리하세요.</p>
  </div>

  <main class="schedual-wrap">

    <!-- 요약 스탯 -->
    <div class="summary-bar">
      <div class="summary-chip">
        <div>
          <div class="chip-num" id="summTotal">—</div>
          <div class="chip-label">전체 일정</div>
        </div>
      </div>
      <div class="summary-chip done-chip">
        <div>
          <div class="chip-num" id="summDone">—</div>
          <div class="chip-label">완료</div>
        </div>
      </div>
      <div class="summary-chip today-chip">
        <div>
          <div class="chip-num" id="summToday">—</div>
          <div class="chip-label">오늘 미완료</div>
        </div>
      </div>
      <div class="summary-chip exam-chip">
        <div>
          <div class="chip-num" id="summExam">—</div>
          <div class="chip-label">다가오는 시험</div>
        </div>
      </div>
    </div>

    <!-- 컨트롤 바 -->
    <div class="ctrl-bar">
      <div class="ctrl-bar-left">
        <!-- 검색 -->
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="일정 검색..." />
        </div>

        <!-- 카테고리 필터 -->
        <select class="filter-select" id="catFilter">
          <option value="전체">전체 카테고리</option>
          <option value="과제">과제/수행</option>
          <option value="시험">시험</option>
          <option value="약속">약속</option>
          <option value="기타">기타</option>
        </select>

        <!-- 상태 필터 -->
        <select class="filter-select" id="statusFilter">
          <option value="전체">전체 상태</option>
          <option value="미완료">미완료</option>
          <option value="완료">완료</option>
        </select>

        <!-- 정렬 -->
        <select class="filter-select" id="sortSelect">
          <option value="날짜순">날짜순</option>
          <option value="날짜역순">날짜 역순</option>
          <option value="이름순">이름순</option>
        </select>
      </div>

      <div class="ctrl-bar-right">
        <!-- 뷰 전환 -->
        <div class="view-toggle">
          <button class="view-btn active" id="viewList">≡ 목록</button>
          <button class="view-btn" id="viewKanban">⊞ 칸반</button>
        </div>

        <!-- 일정 추가 -->
        <button class="add-btn" id="addBtn">
          <span>＋</span>
          <span>일정 추가</span>
        </button>
      </div>
    </div>

    <!-- 리스트 뷰 -->
    <div class="schedule-view active" id="listView">
      <div class="skeleton-item" style="margin-bottom:8px"></div>
      <div class="skeleton-item" style="margin-bottom:8px"></div>
      <div class="skeleton-item"></div>
    </div>

    <!-- 칸반 뷰 -->
    <div class="schedule-view kanban-view" id="kanbanView"></div>

    <!-- 페이지네이션 -->
    <div class="pagination" id="paginationWrap"></div>

  </main>

  <!-- 일정 추가/수정 폼 오버레이 -->
  <div class="inline-form-overlay" id="formOverlay">
    <div class="inline-form-panel">
      <div class="inline-form-title">
        <span id="formPanelTitle">새 일정 추가</span>
        <button class="inline-form-close" id="formPanelClose">✕</button>
      </div>

      <input type="hidden" id="fpId" />

      <div class="form-grid">
        <div class="form-row full">
          <label>제목 <span style="color:var(--accent-red)">*</span></label>
          <input type="text" id="fpName" placeholder="일정 제목을 입력하세요" />
        </div>
        <div class="form-row">
          <label>날짜 / 시간</label>
          <input type="datetime-local" id="fpDate" />
        </div>
        <div class="form-row">
          <label>카테고리</label>
          <select id="fpCategory">
            <option value="">선택 없음</option>
            <option value="과제">과제</option>
            <option value="수행">수행평가</option>
            <option value="시험">시험</option>
            <option value="약속">약속</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-row full">
          <label>키워드</label>
          <input type="text" id="fpKeywords" placeholder="쉼표로 구분 (예: 수학, 중간고사)" />
        </div>
        <div class="form-row full">
          <label>내용</label>
          <textarea id="fpContent" rows="3" placeholder="상세 내용을 입력하세요"></textarea>
        </div>
        <div class="form-row full">
          <label>추가 정보</label>
          <input type="text" id="fpAdd" placeholder="추가 정보 (링크, 메모 등)" />
        </div>
      </div>

      <div class="form-actions" style="margin-top:16px">
        <button class="form-cancel" id="fpCancel">취소</button>
        <button class="form-save" id="fpSave">저장</button>
      </div>
    </div>
  </div>

  <!-- 날짜 상세 사이드 패널 -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-date-label" id="detailDateLabel"></div>
          <div class="detail-dday" id="detailDday"></div>
        </div>
        <button class="detail-close" id="detailClose">✕</button>
      </div>
      <div class="detail-items" id="detailItems"></div>
      <button class="detail-add-btn" id="detailAddBtn">＋ 이 날 일정 추가</button>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 StudyHub · 나만의 학습 관리 시스템</p>
  </footer>

  <script src="shared.js"></script>
  <script src="schedual.js"></script>
</body>
</html>
